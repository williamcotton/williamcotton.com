version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: williamcotton-com:latest
    container_name: williamcotton-com
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # If PORT is not set in .env, default to 7770
      PORT: ${PORT:-7770}
    ports:
      # Map host 7770 to whatever PORT the app listens on in the container
      - "${HOST_PORT:-7770}:${PORT:-7770}"
    volumes:
      - ./app.wp:/app/app.wp:ro
      - ./public:/app/public:ro
      - ./scripts:/app/scripts:ro


